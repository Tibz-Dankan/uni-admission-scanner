name: Build and Deploy To DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/uni-doc-scanner-backend:${{ github.sha }}, ${{ secrets.DOCKERHUB_USERNAME }}/uni-doc-scanner-backend:latest

  deploy:
    name: Deploy to DigitalOcean
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSHKEY }}

      - name: Adding Known Hosts
        run: |
          mkdir -p ~/.ssh
          # ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Debug SSH agent
        run: |
          echo "SSH agent running: $SSH_AUTH_SOCK"
          ssh-add -l

      - name: Verify SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=no ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} "echo 'SSH CONNECTION SUCCESSFUL'"

      - name: Copy deploy script and docker compose file using SSH
        run: |
          scp -o StrictHostKeyChecking=no -o IdentitiesOnly=no scripts/uni-doc-scanner-deploy.sh ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }}:~
        # scp -o StrictHostKeyChecking=no -o IdentitiesOnly=no scripts/entrypoint.sh ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }}:~/app/entrypoint.sh
        # scp -o StrictHostKeyChecking=no -o IdentitiesOnly=no scripts/prisma-migrate.sh ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }}:~

      - name: Deploy to DigitalOcean using SSHun-doc-scanner-deploy
        run: |
          ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=no ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} "chmod +x ~/uni-doc-scanner-deploy.sh && ~/uni-doc-scanner-deploy.sh ${{ secrets.DOCKERHUB_USERNAME }}/uni-doc-scanner-backend:${{ github.sha }}"
        # ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=no ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} "chmod +x ~/prisma-migrate.sh && ~/prisma-migrate.sh"
